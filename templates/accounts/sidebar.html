<!-- accounts/sidebar.html -->
<div class="card shadow-sm border-0 h-100">
    <div class="card-body p-0">

        <div class="list-group list-group-flush rounded-0">

            <!-- Header -->
            <div class="list-group-item bg-primary text-white border-0">
                <h5 class="mb-0">
                    <i class="fas fa-user me-2"></i> My Account
                </h5>
            </div>

            <!-- Dashboard -->
            <a href="{% url 'dashboard' %}"
               class="list-group-item list-group-item-action {% if request.resolver_match.url_name == 'dashboard' %}active{% endif %}">
                <i class="fas fa-tachometer-alt me-3"></i> Dashboard
            </a>

            <!-- Edit Profile -->
            <a href="{% url 'edit_profile' %}"
               class="list-group-item list-group-item-action {% if request.resolver_match.url_name == 'edit_profile' %}active{% endif %}">
                <i class="fas fa-user-edit me-3"></i> Edit Profile
            </a>

            <!-- My Orders -->
            <a href="{% url 'my_orders' %}"
               class="list-group-item list-group-item-action {% if request.resolver_match.url_name == 'my_orders' %}active{% endif %}">
                <i class="fas fa-shopping-bag me-3"></i> My Orders
            </a>

            <!-- Change Password -->
            <a href="{% url 'change_password' %}"
               class="list-group-item list-group-item-action {% if request.resolver_match.url_name == 'change_password' %}active{% endif %}">
                <i class="fas fa-cog me-3"></i> Change Password
            </a>

            <!-- Logout -->
            <form action="{% url 'logout' %}" method="post" class="m-0">
                {% csrf_token %}
                <button type="submit"
                        class="list-group-item list-group-item-action border-0 text-danger w-100 text-start">
                    <i class="fas fa-sign-out-alt me-3"></i> Logout
                </button>
            </form>

        </div>

    </div>
</div>
